<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#12121a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0" r="0.9">
      <stop stop-color="#7c6cff" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#7c6cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7c6cff"/>
      <stop offset="1" stop-color="#5b4bff"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7c6cff"/>
      <stop offset="1" stop-color="#ff8a5c"/>
    </linearGradient>
    <linearGradient id="meter" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#7c6cff"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="620" fill="url(#bg)"/>
  <rect width="1200" height="620" fill="url(#glow)"/>

  <!-- Header -->
  <g transform="translate(48,36)">
    <rect width="34" height="34" rx="9" fill="url(#brand)"/>
    <circle cx="17" cy="17" r="11" fill="none" stroke="#ffffff" stroke-width="1.8" opacity="0.55"/>
    <circle cx="17" cy="17" r="6.5" fill="none" stroke="#ffffff" stroke-width="1.8" opacity="0.85"/>
    <circle cx="17" cy="17" r="2.4" fill="#ffffff"/>
    <text x="46" y="15" fill="#ffffff" font-size="16" font-weight="600">Circles</text>
    <text x="46" y="32" fill="#ffffff" opacity="0.4" font-size="12">plan · act · observe · self-correct</text>
  </g>
  <text x="1152" y="58" fill="#a99cff" font-size="12" text-anchor="end" font-family="JetBrains Mono, monospace">demo engine · no key</text>

  <!-- LEFT: conversation -->
  <g transform="translate(48,104)">
    <rect width="656" height="472" rx="18" fill="#12121a" fill-opacity="0.7" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="24" y="40" fill="#ffffff" font-size="14" font-weight="500">Rehearsing with: <tspan fill="#a99cff">my father</tspan></text>
    <text x="24" y="60" fill="#ffffff" opacity="0.4" font-size="12">Coming out to a parent</text>
    <line x1="0" y1="78" x2="656" y2="78" stroke="#ffffff" stroke-opacity="0.06"/>

    <!-- user bubble -->
    <g transform="translate(196,104)">
      <rect width="436" height="70" rx="16" fill="url(#accent)"/>
      <text x="22" y="30" fill="#ffffff" font-size="13.5">Dad, there's something I've wanted to tell you</text>
      <text x="22" y="50" fill="#ffffff" font-size="13.5">for a long time. I'm gay — and I need you in my life.</text>
    </g>

    <!-- persona bubble -->
    <g transform="translate(24,196)">
      <rect width="452" height="88" rx="16" fill="#ffffff" fill-opacity="0.06"/>
      <text x="22" y="30" fill="#ffffff" fill-opacity="0.9" font-size="13.5">(a long pause) I… I don't know what to say.</text>
      <text x="22" y="50" fill="#ffffff" fill-opacity="0.9" font-size="13.5">This isn't what I imagined for you. But you're</text>
      <text x="22" y="70" fill="#ffffff" fill-opacity="0.9" font-size="13.5">still my kid. I'm not going anywhere.</text>
    </g>

    <!-- user bubble 2 -->
    <g transform="translate(256,306)">
      <rect width="376" height="48" rx="16" fill="url(#accent)"/>
      <text x="22" y="29" fill="#ffffff" font-size="13.5">Thank you. That's all I needed to hear.</text>
    </g>

    <!-- input -->
    <g transform="translate(24,392)">
      <rect width="552" height="56" rx="14" fill="#ffffff" fill-opacity="0.04"/>
      <text x="18" y="33" fill="#ffffff" opacity="0.25" font-size="13.5">What do you say?</text>
      <rect x="568" y="0" width="40" height="56" rx="12" fill="url(#accent)"/>
      <path d="M584 20 l10 8 l-10 8 l3 -8 z" fill="#ffffff"/>
    </g>
  </g>

  <!-- RIGHT: instrumentation -->
  <g transform="translate(728,104)">
    <!-- readiness -->
    <rect width="424" height="132" rx="18" fill="#12121a" fill-opacity="0.7" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="24" y="34" fill="#ffffff" opacity="0.4" font-size="11" letter-spacing="2">READINESS</text>
    <text x="400" y="34" fill="#4ade80" font-size="12" text-anchor="end">Ready</text>
    <text x="24" y="88" fill="#4ade80" font-size="46" font-weight="600" font-family="JetBrains Mono, monospace">84</text>
    <text x="96" y="88" fill="#ffffff" opacity="0.3" font-size="16">/ 100</text>
    <rect x="24" y="104" width="376" height="10" rx="5" fill="#ffffff" fill-opacity="0.05"/>
    <rect x="24" y="104" width="316" height="10" rx="5" fill="url(#meter)"/>
    <line x1="324" y1="102" x2="324" y2="116" stroke="#ffffff" stroke-opacity="0.35"/>

    <!-- loop timeline -->
    <g transform="translate(0,152)">
      <rect width="424" height="128" rx="18" fill="#12121a" fill-opacity="0.7" stroke="#ffffff" stroke-opacity="0.06"/>
      <text x="24" y="30" fill="#ffffff" opacity="0.4" font-size="11" letter-spacing="2">THE LOOP</text>
      <text x="400" y="30" fill="#ffffff" opacity="0.4" font-size="11" text-anchor="end" font-family="JetBrains Mono, monospace">round 4</text>
      <g transform="translate(24,46)">
        <g>
          <rect width="88" height="64" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05"/>
          <text x="44" y="30" text-anchor="middle" font-size="16">🧠</text>
          <text x="44" y="50" text-anchor="middle" fill="#ffffff" fill-opacity="0.5" font-size="11">Plan</text>
        </g>
        <g transform="translate(102,0)">
          <rect width="88" height="64" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05"/>
          <text x="44" y="30" text-anchor="middle" font-size="16">💬</text>
          <text x="44" y="50" text-anchor="middle" fill="#ffffff" fill-opacity="0.5" font-size="11">Act</text>
        </g>
        <g transform="translate(204,0)">
          <rect width="88" height="64" rx="12" fill="#7c6cff" fill-opacity="0.15" stroke="#7c6cff" stroke-opacity="0.6"/>
          <text x="44" y="30" text-anchor="middle" font-size="16">👁</text>
          <text x="44" y="50" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="500">Observe</text>
        </g>
        <g transform="translate(306,0)">
          <rect width="88" height="64" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05"/>
          <text x="44" y="30" text-anchor="middle" font-size="16">✨</text>
          <text x="44" y="50" text-anchor="middle" fill="#ffffff" fill-opacity="0.5" font-size="10">Self-correct</text>
        </g>
      </g>
    </g>

    <!-- coaching -->
    <g transform="translate(0,296)">
      <rect width="424" height="120" rx="18" fill="#12121a" fill-opacity="0.7" stroke="#ffffff" stroke-opacity="0.06"/>
      <g transform="translate(24,28)">
        <rect x="0" y="-4" width="118" height="8" rx="4" fill="#4ade80" opacity="0.85"/>
        <rect x="150" y="-4" width="150" height="8" rx="4" fill="#7c6cff" opacity="0.7"/>
        <rect x="0" y="16" width="90" height="8" rx="4" fill="#fb7185" opacity="0.7"/>
      </g>
      <rect x="24" y="62" width="376" height="40" rx="10" fill="#7c6cff" fill-opacity="0.06" stroke="#7c6cff" stroke-opacity="0.2"/>
      <text x="38" y="79" fill="#a99cff" font-size="12" font-weight="500">💡 That landed. You were clear and kind.</text>
      <text x="38" y="95" fill="#ffffff" fill-opacity="0.55" font-size="11">Hold this line if they push back.</text>
    </g>
  </g>
</svg>
