<svg width="1480" height="1160" viewBox="0 0 1480 1160" xmlns="http://www.w3.org/2000/svg" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1480" y2="1160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a0f"/><stop offset="1" stop-color="#0e0d16"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7c6cff"/><stop offset="1" stop-color="#ff8a5c"/>
    </linearGradient>
    <linearGradient id="engine" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#7c6cff" stop-opacity="0.16"/><stop offset="1" stop-color="#5b4bff" stop-opacity="0.10"/>
    </linearGradient>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#7c6cff"/>
    </marker>
    <marker id="arrowW" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#ff8a5c"/>
    </marker>
    <marker id="arrowG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#4ade80"/>
    </marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0 H0 V32" fill="none" stroke="#ffffff" stroke-opacity="0.03"/>
    </pattern>
    <style>
      .lyr { fill:#12121a; fill-opacity:0.55; stroke:#ffffff; stroke-opacity:0.07; }
      .box { fill:#1a1a25; stroke:#ffffff; stroke-opacity:0.09; }
      .lbl { fill:#ffffff; font-size:13px; font-weight:600; }
      .sub { fill:#ffffff; fill-opacity:0.5; font-size:10.5px; }
      .cap { fill:#a99cff; font-size:11px; letter-spacing:2px; font-weight:600; }
      .mono { font-family:'JetBrains Mono', ui-monospace, monospace; }
      .fn  { fill:#c9c4ff; font-size:10.5px; }
      .edge{ stroke:#7c6cff; stroke-width:1.6; fill:none; }
      .edgeW{ stroke:#ff8a5c; stroke-width:1.6; fill:none; }
      .edgeG{ stroke:#4ade80; stroke-width:1.6; fill:none; }
      .num { fill:#0a0a0f; font-size:11px; font-weight:700; }
    </style>
  </defs>

  <rect width="1480" height="1160" fill="url(#bg)"/>
  <rect width="1480" height="1160" fill="url(#grid)"/>

  <!-- Title -->
  <g transform="translate(40,44)">
    <rect width="30" height="30" rx="8" fill="url(#brand)"/>
    <circle cx="15" cy="15" r="9.5" fill="none" stroke="#fff" stroke-width="1.6" opacity="0.55"/>
    <circle cx="15" cy="15" r="5.5" fill="none" stroke="#fff" stroke-width="1.6" opacity="0.85"/>
    <circle cx="15" cy="15" r="2" fill="#fff"/>
    <text x="42" y="14" fill="#fff" font-size="20" font-weight="700">Circles — System Architecture</text>
    <text x="42" y="34" class="sub" font-size="12.5">A self-directing agent loop · pure engine core · swappable providers · policy-gated egress</text>
  </g>

  <!-- Legend -->
  <g transform="translate(1040,40)">
    <rect width="400" height="52" rx="10" class="lyr"/>
    <circle cx="20" cy="18" r="5" fill="#7c6cff"/><text x="32" y="22" class="sub">control / data flow</text>
    <circle cx="20" cy="38" r="5" fill="#ff8a5c"/><text x="32" y="42" class="sub">network egress (guarded)</text>
    <circle cx="200" cy="18" r="5" fill="#4ade80"/><text x="212" y="22" class="sub">CI / CD · deploy</text>
    <rect x="196" y="33" width="10" height="10" rx="2" fill="url(#engine)" stroke="#7c6cff" stroke-opacity="0.5"/><text x="212" y="42" class="sub">pure · unit-tested</text>
  </g>

  <!-- ===================== CLIENT (BROWSER) ===================== -->
  <g transform="translate(40,112)">
    <rect width="960" height="1000" rx="18" class="lyr"/>
    <text x="24" y="34" class="cap">CLIENT · BROWSER (static SPA on GitHub Pages)</text>
    <text x="936" y="34" text-anchor="end" class="sub mono">zero secrets · demo engine runs fully on-device</text>

    <!-- Layer 1: Presentation -->
    <g transform="translate(24,52)">
      <rect width="912" height="150" rx="14" class="box"/>
      <text x="16" y="26" class="cap" fill="#ff8a5c">① PRESENTATION · React + Framer Motion</text>
      <g>
        <g transform="translate(16,40)"><rect width="150" height="44" rx="9" fill="#221f33"/><text x="12" y="20" class="lbl">SetupPanel</text><text x="12" y="35" class="sub">scenario / spec</text></g>
        <g transform="translate(176,40)"><rect width="168" height="44" rx="9" fill="#221f33"/><text x="12" y="20" class="lbl">ConversationView</text><text x="12" y="35" class="sub">transcript + input</text></g>
        <g transform="translate(354,40)"><rect width="150" height="44" rx="9" fill="#221f33"/><text x="12" y="20" class="lbl">ReadinessMeter</text><text x="12" y="35" class="sub">converge gauge</text></g>
        <g transform="translate(514,40)"><rect width="150" height="44" rx="9" fill="#2a2440" stroke="#7c6cff" stroke-opacity="0.5"/><text x="12" y="20" class="lbl">LoopTimeline</text><text x="12" y="35" class="sub">phase glow</text></g>
        <g transform="translate(674,40)"><rect width="222" height="44" rx="9" fill="#221f33"/><text x="12" y="20" class="lbl">RoundInsight</text><text x="12" y="35" class="sub">heat · clarity · empathy · coaching</text></g>
      </g>
      <g transform="translate(16,96)">
        <g><rect width="150" height="44" rx="9" fill="#332433" stroke="#ff8a5c" stroke-opacity="0.4"/><text x="12" y="20" class="lbl">CurveballBar</text><text x="12" y="35" class="sub">throw a wrench</text></g>
        <g transform="translate(176,0)"><rect width="168" height="44" rx="9" fill="#221f33"/><text x="12" y="20" class="lbl">Settings drawer</text><text x="12" y="35" class="sub">provider + consent</text></g>
        <g transform="translate(354,0)"><rect width="542" height="44" rx="9" fill="#181622"/><text x="12" y="26" class="sub">selectors read state · actions dispatch to the store ▲ renders every phase transition</text></g>
      </g>
    </g>

    <!-- Layer 2: Orchestration -->
    <g transform="translate(24,218)">
      <rect width="912" height="118" rx="14" class="box"/>
      <text x="16" y="26" class="cap" fill="#ff8a5c">② STATE ORCHESTRATION · Zustand store</text>
      <g transform="translate(16,38)"><rect width="250" height="60" rx="9" fill="#221f33"/><text x="12" y="22" class="lbl">submitMessage() pipeline</text><text x="12" y="39" class="sub">resolve provider → guard → animate</text><text x="12" y="52" class="sub">→ analyze → applyRound → commit</text></g>
      <g transform="translate(280,38)"><rect width="200" height="60" rx="9" fill="#221f33"/><text x="12" y="22" class="lbl">phase animator</text><text x="12" y="39" class="sub">act → observe → correct</text><text x="12" y="52" class="sub mono">activePhase glow driver</text></g>
      <g transform="translate(494,38)"><rect width="190" height="60" rx="9" fill="#221f33"/><text x="12" y="22" class="lbl">error / policy banners</text><text x="12" y="39" class="sub">egress notices</text><text x="12" y="52" class="sub">graceful fallback → mock</text></g>
      <g transform="translate(698,38)"><rect width="198" height="60" rx="9" fill="#101019" stroke="#4ade80" stroke-opacity="0.35"/><text x="12" y="22" class="lbl">localStorage</text><text x="12" y="39" class="sub" fill="#4ade80">settings ONLY</text><text x="12" y="52" class="sub">conversation never persisted</text></g>
    </g>

    <!-- Layer 3: Loop engine (pure) -->
    <g transform="translate(24,352)">
      <rect width="912" height="176" rx="14" fill="url(#engine)" stroke="#7c6cff" stroke-opacity="0.45"/>
      <text x="16" y="26" class="cap">③ LOOP ENGINE · pure · deterministic · 37 unit tests</text>
      <text x="896" y="26" text-anchor="end" class="sub mono">src/lib/engine</text>

      <g transform="translate(16,40)"><rect width="150" height="52" rx="9" class="box"/><text x="12" y="22" class="lbl">planLoop()</text><text x="12" y="39" class="fn mono">PLAN → state</text></g>
      <g transform="translate(176,40)"><rect width="168" height="52" rx="9" class="box"/><text x="12" y="22" class="lbl">applyRound()</text><text x="12" y="39" class="fn mono">fold one pass</text></g>
      <g transform="translate(354,40)"><rect width="160" height="52" rx="9" class="box"/><text x="12" y="22" class="lbl">scoreRound()</text><text x="12" y="39" class="fn mono">clarity·empathy·heat</text></g>
      <g transform="translate(524,40)"><rect width="180" height="52" rx="9" class="box"/><text x="12" y="22" class="lbl">nextDifficulty()</text><text x="12" y="39" class="fn mono">adapt ± persona push</text></g>
      <g transform="translate(714,40)"><rect width="182" height="52" rx="9" class="box"/><text x="12" y="22" class="lbl">updateReadiness()</text><text x="12" y="39" class="fn mono">smoothed EMA</text></g>

      <!-- feedback loop -->
      <g transform="translate(16,104)">
        <rect width="430" height="56" rx="9" fill="#0f0e1a"/>
        <text x="14" y="22" class="lbl">hasConverged()</text>
        <text x="14" y="40" class="sub">readiness ≥ 80 for ≥ 3 rounds → loop self-terminates</text>
      </g>
      <g transform="translate(470,104)">
        <rect width="426" height="56" rx="9" fill="#0f0e1a" stroke="#7c6cff" stroke-opacity="0.4" stroke-dasharray="4 4"/>
        <text x="14" y="22" class="lbl" fill="#a99cff">↺ SELF-CORRECTION FEEDBACK</text>
        <text x="14" y="40" class="sub">observed outcome reshapes next persona difficulty + coaching</text>
      </g>
    </g>

    <!-- Layer 4: Guard -->
    <g transform="translate(24,544)">
      <rect width="912" height="94" rx="14" fill="#101c14" stroke="#4ade80" stroke-opacity="0.35"/>
      <text x="16" y="26" class="cap" fill="#4ade80">④ PRIVACY GUARD · policy boundary (Pomerium-shaped)</text>
      <g transform="translate(16,38)"><rect width="220" height="42" rx="9" class="box"/><text x="12" y="18" class="lbl">redactPII()</text><text x="12" y="34" class="sub">email · phone · SSN · card</text></g>
      <g transform="translate(250,38)"><rect width="240" height="42" rx="9" class="box"/><text x="12" y="18" class="lbl">classifySensitivity()</text><text x="12" y="34" class="sub">low / medium / high</text></g>
      <g transform="translate(504,38)"><rect width="392" height="42" rx="9" class="box"/><text x="12" y="18" class="lbl">evaluateEgress()</text><text x="12" y="34" class="sub">high-risk blocked off-device unless explicit consent</text></g>
    </g>

    <!-- Layer 5: Providers -->
    <g transform="translate(24,654)">
      <rect width="912" height="322" rx="14" class="box"/>
      <text x="16" y="26" class="cap" fill="#ff8a5c">⑤ MODEL PROVIDERS · one interface: analyze(input) → {persona, observation, coaching}</text>

      <g transform="translate(16,40)"><rect width="288" height="120" rx="10" fill="#1c2620" stroke="#4ade80" stroke-opacity="0.4"/>
        <text x="14" y="26" class="lbl">mock — demo engine</text>
        <text x="14" y="46" class="sub">deterministic heuristics</text>
        <text x="14" y="62" class="sub">reads I-statements · blame · avoidance</text>
        <text x="14" y="78" class="sub">· heat · goal hits</text>
        <text x="14" y="100" class="sub" fill="#4ade80">✓ no network · no key · on-device</text>
      </g>
      <g transform="translate(320,40)"><rect width="288" height="120" rx="10" class="box"/>
        <text x="14" y="26" class="lbl">anthropic</text>
        <text x="14" y="46" class="sub">browser-direct Messages API</text>
        <text x="14" y="62" class="sub">user's own key (localStorage)</text>
        <text x="14" y="86" class="fn mono">claude-sonnet-5</text>
      </g>
      <g transform="translate(624,40)"><rect width="272" height="120" rx="10" class="box"/>
        <text x="14" y="26" class="lbl">bedrock</text>
        <text x="14" y="46" class="sub">via signing proxy (no creds</text>
        <text x="14" y="62" class="sub">in browser)</text>
        <text x="14" y="86" class="fn mono">claude-3.5-sonnet</text>
      </g>

      <!-- shared prompt -->
      <g transform="translate(16,172)"><rect width="880" height="60" rx="10" fill="#181622"/>
        <text x="14" y="24" class="lbl">shared prompt.ts</text>
        <text x="14" y="44" class="sub">SYSTEM_PROMPT (persona + observer + coach in one strict-JSON turn) · buildUserPrompt() · tolerant parseAnalysis()</text>
      </g>
      <!-- one round -->
      <g transform="translate(16,244)"><rect width="880" height="60" rx="10" fill="#0f0e1a" stroke="#7c6cff" stroke-opacity="0.35"/>
        <text x="14" y="24" class="lbl" fill="#a99cff">ONE MODEL CALL = ONE ROUND</text>
        <text x="14" y="44" class="sub">personaReply (in character) + observation (scores the USER) + coaching (concrete next line)</text>
      </g>
    </g>
  </g>

  <!-- ===================== EGRESS BOUNDARY ===================== -->
  <line x1="1016" y1="120" x2="1016" y2="700" stroke="#ff8a5c" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="1016" y="712" text-anchor="middle" class="sub" fill="#ff8a5c">egress gate</text>

  <!-- ===================== CLOUD / SPONSORS ===================== -->
  <g transform="translate(1036,112)">
    <rect width="404" height="470" rx="18" class="lyr"/>
    <text x="24" y="34" class="cap" fill="#ff8a5c">CLOUD MODELS (only redacted, consented traffic)</text>

    <g transform="translate(24,54)"><rect width="356" height="92" rx="12" class="box"/>
      <text x="16" y="28" class="lbl">Anthropic API</text>
      <text x="16" y="48" class="sub">Claude · Messages API</text>
      <text x="16" y="68" class="sub mono">api.anthropic.com</text>
      <text x="16" y="84" class="sub">browser-direct (dangerous header opt-in)</text>
    </g>

    <g transform="translate(24,162)"><rect width="356" height="150" rx="12" fill="#231d16" stroke="#ff8a5c" stroke-opacity="0.4"/>
      <text x="16" y="28" class="lbl" fill="#ffb38a">AWS Bedrock  ·  sponsor</text>
      <g transform="translate(16,42)"><rect width="324" height="44" rx="9" fill="#1a1a25"/><text x="12" y="20" class="lbl">bedrock-handler.ts</text><text x="12" y="36" class="sub">SigV4 InvokeModel · IAM role</text></g>
      <text x="16" y="106" class="sub">Claude 3.5 Sonnet on Bedrock</text>
      <text x="16" y="124" class="sub">creds stay server-side · never in browser</text>
    </g>

    <g transform="translate(24,328)"><rect width="356" height="118" rx="12" fill="#161d22" stroke="#4ade80" stroke-opacity="0.3"/>
      <text x="16" y="28" class="lbl">Deploy targets</text>
      <g transform="translate(16,40)"><rect width="150" height="60" rx="9" fill="#1a1a25"/><text x="12" y="24" class="lbl">Akash</text><text x="12" y="40" class="sub">open compute</text><text x="12" y="53" class="sub">private proxy</text></g>
      <g transform="translate(174,40)"><rect width="166" height="60" rx="9" fill="#1a1a25"/><text x="12" y="24" class="lbl">AWS Lambda</text><text x="12" y="40" class="sub">Function URL /</text><text x="12" y="53" class="sub">API Gateway</text></g>
    </g>
  </g>

  <!-- ===================== POMERIUM ===================== -->
  <g transform="translate(1036,600)">
    <rect width="404" height="96" rx="18" fill="#1a1420" stroke="#7c6cff" stroke-opacity="0.4"/>
    <text x="24" y="32" class="cap">POMERIUM · runtime enforcement (deploy story)</text>
    <text x="24" y="56" class="sub">identity-aware access + egress policy at the</text>
    <text x="24" y="74" class="sub">network boundary — mirrors evaluateEgress()</text>
  </g>

  <!-- ===================== CI / CD ===================== -->
  <g transform="translate(1036,712)">
    <rect width="404" height="400" rx="18" class="lyr"/>
    <text x="24" y="34" class="cap" fill="#4ade80">CI / CD · GitHub Actions</text>

    <g transform="translate(24,52)"><rect width="356" height="52" rx="10" class="box"/><text x="14" y="22" class="lbl">git push → main</text><text x="14" y="40" class="sub">source of truth</text></g>
    <g transform="translate(24,120)"><rect width="356" height="70" rx="10" fill="#161d22" stroke="#4ade80" stroke-opacity="0.3"/><text x="14" y="24" class="lbl">ci.yml</text><text x="14" y="42" class="sub">typecheck · 37 tests · build</text><text x="14" y="60" class="sub mono">every push + PR</text></g>
    <g transform="translate(24,206)"><rect width="356" height="70" rx="10" fill="#161d22" stroke="#4ade80" stroke-opacity="0.3"/><text x="14" y="24" class="lbl">deploy.yml</text><text x="14" y="42" class="sub">build (base=/circles/) → upload artifact</text><text x="14" y="60" class="sub mono">→ actions/deploy-pages</text></g>
    <g transform="translate(24,292)"><rect width="356" height="86" rx="10" fill="#1c2620" stroke="#4ade80" stroke-opacity="0.45"/><text x="14" y="26" class="lbl">GitHub Pages</text><text x="14" y="46" class="sub">the live, credential-free demo</text><text x="14" y="66" class="sub mono" fill="#4ade80">vnmoorthy.github.io/circles/</text></g>
  </g>

  <!-- ============ FLOW EDGES (client stack) ============ -->
  <!-- presentation -> store -->
  <path class="edge" d="M496 314 V330" marker-end="url(#arrow)"/>
  <!-- store -> engine -->
  <path class="edge" d="M496 448 V464" marker-end="url(#arrow)"/>
  <!-- store -> guard (side) -->
  <path class="edge" d="M112 448 V656 H 220" marker-end="url(#arrow)"/>
  <!-- guard -> providers -->
  <path class="edge" d="M496 750 V766" marker-end="url(#arrow)"/>
  <!-- engine -> presentation (render new state) feedback up left -->
  <path class="edge" d="M40 520 H 20 V 300 H 40" marker-end="url(#arrow)"/>
  <text x="6" y="412" class="sub" transform="rotate(-90,10,412)" fill="#a99cff">commit new LoopState ↑ render</text>

  <!-- providers egress to cloud -->
  <path class="edgeW" d="M960 812 H 1016 H 1060" marker-end="url(#arrowW)"/>
  <text x="1024" y="806" class="sub" fill="#ff8a5c">redacted</text>

  <!-- Pages serves browser -->
  <path class="edgeG" d="M1216 1004 V 1120 H 60 V 1112" marker-end="url(#arrowG)"/>
  <text x="640" y="1136" text-anchor="middle" class="sub" fill="#4ade80">GitHub Pages serves the static SPA to every visitor's browser</text>

  <!-- numbered flow badges -->
  <g>
    <circle cx="512" cy="322" r="10" fill="#7c6cff"/><text x="512" y="326" text-anchor="middle" class="num">1</text>
    <circle cx="512" cy="456" r="10" fill="#7c6cff"/><text x="512" y="460" text-anchor="middle" class="num">2</text>
    <circle cx="236" cy="700" r="10" fill="#4ade80"/><text x="236" y="704" text-anchor="middle" class="num">3</text>
    <circle cx="512" cy="758" r="10" fill="#ff8a5c"/><text x="512" y="762" text-anchor="middle" class="num">4</text>
    <circle cx="1040" cy="812" r="10" fill="#ff8a5c"/><text x="1040" y="816" text-anchor="middle" class="num">5</text>
    <circle cx="30" cy="410" r="10" fill="#7c6cff"/><text x="30" y="414" text-anchor="middle" class="num">6</text>
  </g>
</svg>
